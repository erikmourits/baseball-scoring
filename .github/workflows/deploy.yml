name: Deploy to baseball.mourits.nu

on:
  release:
    types: [published]
  workflow_dispatch:

# Default local Supabase keys (same on every install using the default JWT secret).
# These are public knowledge — safe to hardcode for a local-only CI instance.
env:
  SUPABASE_LOCAL_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqHDjx5mV1OtUbxBRUhJmzicnjOIhq14w
  SUPABASE_LOCAL_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Generate E2E credentials
        id: e2e_creds
        run: |
          echo "email=e2e-${GITHUB_RUN_ID}@test.local" >> $GITHUB_OUTPUT
          echo "password=$(openssl rand -hex 16)" >> $GITHUB_OUTPUT

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations to local Supabase
        run: supabase db reset --no-seed

      - name: Create E2E test user
        run: |
          curl -sf -X POST http://127.0.0.1:54321/auth/v1/admin/users \
            -H "apikey: $SUPABASE_LOCAL_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_LOCAL_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"id":"e2e00000-0000-0000-0000-000000000000","email":"'"$E2E_EMAIL"'","password":"'"$E2E_PASSWORD"'","email_confirm":true}'
        env:
          E2E_EMAIL: ${{ steps.e2e_creds.outputs.email }}
          E2E_PASSWORD: ${{ steps.e2e_creds.outputs.password }}

      - name: Seed E2E test data
        run: psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -f supabase/seed.e2e.sql

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY }}
          E2E_EMAIL: ${{ steps.e2e_creds.outputs.email }}
          E2E_PASSWORD: ${{ steps.e2e_creds.outputs.password }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Run database migrations
        run: node scripts/migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Edge Functions
        run: node scripts/deploy-functions.js
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /export/www/baseball.mourits.nu/
          remote_host: ${{ vars.DEPLOY_HOST }}
          remote_user: ${{ vars.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
