name: Deploy to baseball.mourits.nu

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run database migrations
        run: node scripts/migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy Edge Functions
        run: node scripts/deploy-functions.js
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations to local Supabase
        run: supabase db reset --no-seed

      - name: Get local Supabase credentials
        id: supabase_local
        run: |
          echo "anon_key=$(supabase status | grep 'anon key' | awk '{print $NF}')" >> $GITHUB_OUTPUT
          echo "service_key=$(supabase status | grep 'service_role key' | awk '{print $NF}')" >> $GITHUB_OUTPUT

      - name: Create E2E test user
        run: |
          curl -sf -X POST http://127.0.0.1:54321/auth/v1/admin/users \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"id":"e2e00000-0000-0000-0000-000000000000","email":"'"$E2E_EMAIL"'","password":"'"$E2E_PASSWORD"'","email_confirm":true}'
        env:
          SERVICE_KEY: ${{ steps.supabase_local.outputs.service_key }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Seed E2E test data
        run: psql postgresql://postgres:postgres@127.0.0.1:54322/postgres -f supabase/seed.e2e.sql

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ steps.supabase_local.outputs.anon_key }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /export/www/baseball.mourits.nu/
          remote_host: ${{ vars.DEPLOY_HOST }}
          remote_user: ${{ vars.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
