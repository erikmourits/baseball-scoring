name: Deploy to baseball.mourits.nu

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Restore Supabase Docker image cache
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/.docker-images
          key: supabase-docker-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: supabase-docker-${{ runner.os }}-

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load --input /tmp/.docker-images/supabase.tar

      - name: Start local Supabase
        run: supabase start

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/.docker-images
          docker save $(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "^<none>") --output /tmp/.docker-images/supabase.tar

      - name: Apply migrations and seed E2E data
        run: |
          supabase db reset --no-seed
          psql -v ON_ERROR_STOP=1 postgresql://postgres:postgres@127.0.0.1:54322/postgres -f supabase/seed.e2e.sql
          ANON_KEY=$(supabase status --output json | python3 -c "import sys,json; print(json.load(sys.stdin)['ANON_KEY'])")
          [ -n "$ANON_KEY" ] || { echo "ERROR: Could not extract ANON_KEY from supabase status"; exit 1; }
          echo "VITE_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ env.VITE_SUPABASE_ANON_KEY }}
          E2E_EMAIL: e2e@test.local
          E2E_PASSWORD: e2e-test-password

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Run database migrations
        run: node scripts/migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Edge Functions
        run: node scripts/deploy-functions.js
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /export/www/baseball.mourits.nu/
          remote_host: ${{ vars.DEPLOY_HOST }}
          remote_user: ${{ vars.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
