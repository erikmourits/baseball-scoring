# Apache virtual host config for baseball.mourits.nu
# Place at: /etc/apache2/sites-available/baseball.mourits.nu.conf
# Enable with: sudo a2ensite baseball.mourits.nu
# Then: sudo systemctl reload apache2
#
# Required modules (enable once):
#   sudo a2enmod rewrite headers ssl

# Redirect HTTP → HTTPS
<VirtualHost *:80>
    ServerName baseball.mourits.nu
    Redirect permanent / https://baseball.mourits.nu/
</VirtualHost>

<VirtualHost *:443>
    ServerName baseball.mourits.nu

    # SSL — managed by Certbot (run: sudo certbot --apache -d baseball.mourits.nu)
    SSLEngine on
    SSLCertificateFile     /etc/letsencrypt/live/baseball.mourits.nu/fullchain.pem
    SSLCertificateKeyFile  /etc/letsencrypt/live/baseball.mourits.nu/privkey.pem
    Include                /etc/letsencrypt/options-ssl-apache.conf

    # Document root
    DocumentRoot /export/www/baseball.mourits.nu

    <Directory /export/www/baseball.mourits.nu>
        Options -Indexes -MultiViews
        AllowOverride None
        Require all granted

        # SPA fallback — all routes serve index.html
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # Long-lived cache for hashed static assets (JS, CSS, fonts, images)
    <LocationMatch "\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Service worker must not be cached — always re-fetch
    <Location "/sw.js">
        Header set Cache-Control "no-store, no-cache, must-revalidate"
        Header set Expires "0"
    </Location>

    # Security headers
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set Permissions-Policy        "camera=(self)"
</VirtualHost>
