# Nginx config for baseball.mourits.nu
# Place this file at: /etc/nginx/sites-available/baseball.mourits.nu
# Then: sudo ln -s /etc/nginx/sites-available/baseball.mourits.nu /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name baseball.mourits.nu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name baseball.mourits.nu;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d baseball.mourits.nu)
    ssl_certificate     /etc/letsencrypt/live/baseball.mourits.nu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baseball.mourits.nu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Document root
    root  /var/www/baseball-scoring;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets (JS, CSS, fonts, images)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service worker must not be cached — always re-fetch
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(self)" always;
}
